<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse Digital Solutions — CRM</title>
<style>
  :root {
    --bg: #0d0b14;
    --white: #16121f;
    --sidebar: #09080e;
    --border: #2a2440;
    --border-light: #1e1a2e;
    --text: #e8e4f4;
    --text-2: #a89ec8;
    --text-3: #6b6488;
    --indigo: #9b6dff;
    --indigo-light: #1e1535;
    --indigo-dark: #7c3aed;
    --green: #34d399;
    --green-light: #0a2318;
    --green-text: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --red-light: #2a0f0f;
    --red-text: #f87171;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ── LAYOUT ── */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--sidebar); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .main-wrap { margin-left: 220px; flex: 1; min-height: 100vh; }
  .main { padding: 32px 36px; max-width: 1280px; }

  /* ── SIDEBAR ── */
  .brand { padding: 18px 16px 14px; border-bottom: 1px solid rgba(255,255,255,.07); }
  .brand-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.2px; display:none; }
  .brand-sub { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 3px; }
  .nav { padding: 12px 8px; flex: 1; }
  .nav-btn { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: var(--radius); background: transparent; color: rgba(255,255,255,.4); font-size: 13px; cursor: pointer; border: none; width: 100%; text-align: left; margin-bottom: 2px; border-left: 3px solid transparent; font-family: inherit; transition: all .15s; }
  .nav-btn:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.75); }
  .nav-btn.active { background: rgba(124,58,237,.18); color: #a78bfa; font-weight: 600; border-left-color: #7c3aed; }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; font-size: 11px; background: rgba(255,255,255,.08); color: rgba(255,255,255,.3); padding: 1px 7px; border-radius: 10px; font-weight: 600; }
  .nav-btn.active .nav-badge { background: rgba(124,58,237,.25); color: #c4b5fd; }
  .sidebar-footer { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,.06); }
  .sidebar-date { font-size: 11px; color: rgba(167,139,250,.35); }

  /* ── PAGE HEADER ── */
  .page-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 26px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 22px; font-weight: 700; color: #e8e4f4; letter-spacing: -0.4px; }
  .page-sub { font-size: 13px; color: var(--text-3); margin-top: 3px; }
  .hdr-btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* ── BUTTONS ── */
  .btn { padding: 8px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: #1e1a2e; color: var(--text-2); display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-family: inherit; transition: background .15s; white-space: nowrap; }
  .btn:hover { background: #252038; }
  .btn-primary { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: none; background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%); color: #fff; display: inline-flex; align-items: center; gap: 6px; font-weight: 600; font-family: inherit; transition: opacity .15s; white-space: nowrap; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-sm { padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: #1e1a2e; color: var(--text-2); display: inline-flex; align-items: center; gap: 4px; font-family: inherit; transition: background .15s; }
  .btn-sm:hover { background: #252038; }
  .btn-quote { padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #3d2a70; background: #1e1535; color: #9b6dff; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
  .btn-quote:hover { background: #261a44; }
  .btn-star { padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #0d3320; background: #0a2318; color: var(--green-text); display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
  .btn-star:hover { background: #dcfce7; }
  .btn-del { padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #3d1515; background: #1f0f0f; color: var(--red-text); display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
  .btn-del:hover { background: #fee2e2; }

  /* ── STATS ── */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: #13101e; border-radius: var(--radius-lg); padding: 18px 20px; border: 1px solid var(--border); }
  .stat-val { font-size: 30px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 12px; color: var(--text-3); margin-top: 6px; font-weight: 500; }
  .stat-grid-sm { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border); border-radius: var(--radius); background: #13101e; font-size: 13px; outline: none; color: var(--text); font-family: inherit; transition: border-color .15s; }
  .search-wrap input:focus { border-color: #7c3aed; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; display: flex; }
  .filter-btn { padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: #13101e; color: var(--text-3); font-family: inherit; transition: all .15s; white-space: nowrap; font-weight: 500; }
  .filter-btn:hover { border-color: #c7d2fe; color: var(--indigo); }
  .filter-btn.active { border-color: #7c3aed; background: #f5f3ff; color: #7c3aed; font-weight: 600; }

  /* ── TABLE ── */
  .card { background: #13101e; border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; background: #13101e; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1a1628; }
  .actions { display: flex; gap: 5px; flex-wrap: wrap; }
  .empty-state { padding: 56px; text-align: center; color: var(--text-3); }

  /* ── PILLS ── */
  .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .pill-llamado { background: #dcfce7; color: var(--green-text); }
  .pill-nollamado { background: #fee2e2; color: var(--red-text); }
  .pill-static { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }

  /* ── AVATAR ── */
  .avatar { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .avatar-sm { width: 30px; height: 30px; border-radius: 7px; font-size: 11px; }

  /* ── MODAL ── */
  .overlay { position: fixed; inset: 0; background: rgba(5,3,10,.75); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; backdrop-filter: blur(2px); }
  .modal { background: #16121f; border-radius: 14px; padding: 28px 30px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.2); }
  .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-3); line-height: 1; padding: 2px 4px; font-family: inherit; }
  .modal-close:hover { color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1/-1; }
  .form-lbl { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; outline: none; background: #0d0b14; color: var(--text); font-family: inherit; transition: border-color .15s; }
  .form-input:focus { border-color: #7c3aed; }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

  /* ── QUOTE MODAL ── */
  .client-box { background: #13101e; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 11px; }
  .plan-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; transition: all .15s; background: #13101e; }
  .plan-card:hover { border-color: #3d2a70; background: #1e1535; }
  .plan-card.selected { border: 2px solid #9b6dff; background: #1e1535; }
  .plan-card-l .pname { font-size: 13px; font-weight: 600; color: var(--text); }
  .plan-card.selected .pname { color: var(--indigo-dark); }
  .plan-card-l .pmonth { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  .plan-card-r .pprice { font-size: 20px; font-weight: 700; color: #7c3aed; text-align: right; }
  .plan-card-r .pprice-lbl { font-size: 10px; color: var(--text-3); text-align: right; margin-top: 2px; }

  /* ── SERVICES ── */
  .srv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .srv-card { background: #13101e; border-radius: var(--radius-lg); border: 1px solid var(--border); border-top-width: 3px; padding: 22px 24px; }
  .price-boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .price-box { background: #0d0b14; border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; }
  .price-box-lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .price-box-val { font-size: 22px; font-weight: 700; }
  .price-box-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .feat-list { border-top: 1px solid var(--border-light); padding-top: 14px; }
  .feat-item { font-size: 12px; color: var(--text-2); padding: 5px 0; border-bottom: 1px solid #f8fafc; display: flex; gap: 8px; align-items: flex-start; }
  .feat-check { color: #22c55e; font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  /* ── SECTION LABEL ── */
  .sec-lbl { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

  /* ── DASHBOARD HISTORY TABLE ── */
  .history-folio { font-family: monospace; font-size: 11px; background: #f5f3ff; color: #7c3aed; padding: 2px 8px; border-radius: 6px; }

  /* ── NOTIFICATION TOAST ── */
  .toast { position: fixed; bottom: 24px; right: 24px; background: #2d1066; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,.25); opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3d2a70; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #5b21b6; }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed; inset: 0; background: #0a0810;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    width: 380px; background: #13101e;
    border: 1px solid #2a2440; border-radius: 16px;
    padding: 40px 36px; text-align: center;
  }
  .login-logo { margin-bottom: 6px; }
  .login-logo img { width: 260px; height: auto; display: block; margin: 0 auto; }
  .login-title { font-size: 20px; font-weight: 700; color: #e8e4f4; margin-bottom: 6px; letter-spacing: -0.3px; }
  .login-sub { font-size: 13px; color: #6b6488; margin-bottom: 32px; }
  .login-field { text-align: left; margin-bottom: 16px; }
  .login-field label { display: block; font-size: 12px; font-weight: 600; color: #a89ec8; margin-bottom: 6px; letter-spacing: 0.3px; text-transform: uppercase; }
  .login-field input {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    background: #0d0b14; border: 1px solid #2a2440;
    color: #e8e4f4; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .15s;
  }
  .login-field input:focus { border-color: #7c3aed; }
  .login-field input::placeholder { color: #3d3658; }
  .login-error { font-size: 12px; color: #f87171; margin-bottom: 14px; min-height: 18px; }
  .login-btn {
    width: 100%; padding: 11px; border-radius: 8px;
    background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
    color: #fff; font-size: 14px; font-weight: 700;
    font-family: inherit; border: none; cursor: pointer;
    transition: opacity .15s; letter-spacing: 0.2px;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-footer { margin-top: 24px; font-size: 11px; color: #3d3658; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="logo.png" alt="Synapse">
    </div>
    <div class="login-sub">Acceso Interno</div>
    <div class="login-field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="Correo" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••••••" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn">Ingresar</button>
    <div class="login-footer">© 2026 Synapse Digital Solutions</div>
  </div>
</div>

<div class="layout" id="crm-app" style="display:none">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand">
      <img src="logo.png" alt="Synapse" style="width:130px;height:auto;display:block;margin:0 auto;padding:6px 0">
    </div>
    <div class="nav" id="nav-menu"></div>
    <div class="sidebar-footer">
      <div class="sidebar-date" id="sidebar-date"></div>
      <div style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div style="font-size:11px;color:rgba(167,139,250,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sidebar-user"></div>
        <button onclick="doLogout()" title="Cerrar sesión" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.25);padding:2px;border-radius:4px;display:flex;align-items:center;flex-shrink:0;transition:color .15s" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='rgba(255,255,255,.25)'">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main-wrap">
    <div class="main" id="main-content"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div id="modal-form" style="display:none" class="overlay" onclick="overlayClose(event,'modal-form')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title" id="mf-title">Agregar registro</span>
      <button class="modal-close" onclick="closeModal('modal-form')">×</button>
    </div>
    <div class="form-grid">
      <div><label class="form-lbl">Nombre *</label><input class="form-input" id="f-nombre" placeholder="Empresa o persona"></div>
      <div><label class="form-lbl">Teléfono</label><input class="form-input" id="f-tel" placeholder="33 1234 5678"></div>
      <div><label class="form-lbl">Correo</label><input class="form-input" id="f-email" placeholder="correo@empresa.com"></div>
      <div class="form-full"><label class="form-lbl">Ubicación</label><input class="form-input" id="f-ubic" placeholder="Ciudad, colonia, dirección..."></div>
      <div class="form-full"><label class="form-lbl">Sitio Web</label><input class="form-input" id="f-web" placeholder="https://ejemplo.com"></div>
      <div class="form-full"><label class="form-lbl">Notas / Comentarios</label><textarea class="form-input" id="f-notas" placeholder="Qué dijo, qué necesita, próximo paso..."></textarea></div>
      <div>
        <label class="form-lbl">Estado</label>
        <select class="form-input" id="f-estado">
          <option value="no_llamado">Sin llamar</option>
          <option value="llamado">Llamado</option>
        </select>
      </div>
      <div>
        <label class="form-lbl">Tipo</label>
        <select class="form-input" id="f-tipo">
          <option value="prospecto">Prospecto</option>
          <option value="cliente">Cliente</option>
        </select>
      </div>
      <div class="form-full">
        <label class="form-lbl">Sector</label>
        <select class="form-input" id="f-sector" onchange="onSectorChange(this)"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-form')">Cancelar</button>
      <button class="btn-primary" onclick="saveForm()">Guardar registro</button>
    </div>
  </div>
</div>

<!-- QUOTE MODAL -->
<div id="modal-quote" style="display:none" class="overlay" onclick="overlayClose(event,'modal-quote')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">Generar cotización</span>
      <button class="modal-close" onclick="closeModal('modal-quote')">×</button>
    </div>
    <div class="client-box" id="q-client-info"></div>
    <div class="sec-lbl">Seleccionar plan</div>
    <div id="q-plan-list"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-top:14px;background:#0d0b14;border-radius:8px;padding:14px 16px;border:1px solid #2a2440;align-items:end">
      <div>
        <label class="form-lbl" style="font-size:10px;margin-bottom:5px;display:block">Implementación (MXN)</label>
        <input class="form-input" id="q-precio-impl" type="number" placeholder="0" style="font-size:14px;font-weight:600;color:#e8e4f4">
      </div>
      <div>
        <label class="form-lbl" style="font-size:10px;margin-bottom:5px;display:block">Mensual (MXN)</label>
        <input class="form-input" id="q-precio-mens" type="number" placeholder="0" style="font-size:14px;font-weight:600;color:#9b6dff">
      </div>
      <div style="min-width:110px">
        <label class="form-lbl" style="font-size:10px;margin-bottom:5px;display:block">Descuento (%)</label>
        <input class="form-input" id="q-descuento" type="number" placeholder="0" min="0" max="100" style="font-size:14px;font-weight:600">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-quote')">Cancelar</button>
      <button class="btn-primary" onclick="doQuote()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Generar PDF
      </button>
    </div>
  </div>
</div>

<!-- PLAN EDIT MODAL -->
<div id="modal-plan" style="display:none" class="overlay" onclick="overlayClose(event,'modal-plan')">
  <div class="modal" style="max-width:600px;max-height:88vh" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title" id="modal-plan-title">Editar plan</span>
      <button class="modal-close" onclick="closeModal('modal-plan')">×</button>
    </div>
    <div id="modal-plan-body" style="overflow-y:auto;max-height:calc(88vh - 80px)"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

let editingPlanId = null;
let editingFeatures = [];

function openPlanEditor(id) {
  if (id === 'new') {
    editingPlanId = null;
    editingFeatures = [];
    document.getElementById('modal-plan-title').textContent = 'Nuevo plan';
  } else {
    const p = PLANES.find(x => x.id === id);
    editingPlanId = id;
    editingFeatures = [...(p.features || [])];
    document.getElementById('modal-plan-title').textContent = 'Editar plan';
  }
  renderPlanEditorBody();
  document.getElementById('modal-plan').style.display = 'flex';
}

function renderPlanEditorBody() {
  const p = editingPlanId ? PLANES.find(x => x.id === editingPlanId) : null;
  document.getElementById('modal-plan-body').innerHTML = `
    <div style="padding:0 2px 20px">
      <div class="form-grid" style="margin-bottom:16px">
        <div class="form-full"><label class="form-lbl">Nombre del plan</label>
          <input class="form-input" id="pe-nombre" value="${p ? esc(p.nombre) : ''}"></div>
        <div><label class="form-lbl">Implementación (MXN)</label>
          <input class="form-input" id="pe-impl" type="number" value="${p ? p.implementacion : ''}"></div>
        <div><label class="form-lbl">Mensual (MXN)</label>
          <input class="form-input" id="pe-mens" type="number" value="${p ? p.mensual : ''}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label class="form-lbl" style="margin:0">Servicios incluidos</label>
        <button class="btn-sm" onclick="peAddFeature()">+ Agregar ítem</button>
      </div>
      <div id="pe-features" style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
        ${editingFeatures.map((f, i) => `
        <div style="display:flex;gap:6px;align-items:center">
          <input value="${esc(f)}" oninput="editingFeatures[${i}]=this.value" class="form-input" style="flex:1">
          <button onclick="peRemoveFeature(${i})" class="btn-del" style="flex-shrink:0;padding:7px 10px">✕</button>
        </div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid #2a2440">
        ${editingPlanId ? `<button onclick="deletePlan(${editingPlanId})" class="btn-del">🗑 Eliminar plan</button>` : '<div></div>'}
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="closeModal('modal-plan')">Cancelar</button>
          <button class="btn-primary" onclick="savePlanEditor()">Guardar plan</button>
        </div>
      </div>
    </div>`;
}
function peAddFeature() {
  editingFeatures.push('');
  renderPlanEditorBody();
  const inputs = document.querySelectorAll('#pe-features input');
  if (inputs.length) inputs[inputs.length-1].focus();
}
function peRemoveFeature(i) {
  editingFeatures.splice(i, 1);
  renderPlanEditorBody();
}
function savePlanEditor() {
  const nombre = document.getElementById('pe-nombre').value.trim();
  const impl = Math.abs(parseInt(document.getElementById('pe-impl').value)) || 0;
  const mens = Math.abs(parseInt(document.getElementById('pe-mens').value)) || 0;
  if (!nombre) { alert('El nombre es obligatorio.'); return; }
  const features = editingFeatures.filter(f => f.trim());
  if (editingPlanId) {
    const p = PLANES.find(x => x.id === editingPlanId);
    p.nombre = nombre; p.implementacion = impl; p.mensual = mens; p.features = features;
  } else {
    const newId = Math.max(0, ...PLANES.map(p => p.id)) + 1;
    PLANES.push({ id: newId, nombre, implementacion: impl, mensual: mens, features });
  }
  savePlanesToStorage();
  closeModal('modal-plan');
  renderAll();
  toast(editingPlanId ? 'Plan actualizado' : 'Plan creado');
}
function deletePlan(id) {
  if (!confirm('¿Eliminar este plan? No se puede deshacer.')) return;
  const idx = PLANES.findIndex(p => p.id === id);
  if (idx >= 0) PLANES.splice(idx, 1);
  savePlanesToStorage();
  closeModal('modal-plan');
  renderAll();
  toast('Plan eliminado');
}
function editPlan(id) { openPlanEditor(id); }

// ── SECTORES (localStorage) ──
const SECTORES_KEY = 'synapse_sectores_v1';
const SECTORES_DEFAULT = ['Despacho de Abogados','Boutique de Ropa','Restaurante / Servicios de Comida','Inmobiliaria','Salud / Médico','Tecnología','Otro'];
function getSectores() {
  try { const s = JSON.parse(localStorage.getItem(SECTORES_KEY)); return Array.isArray(s) ? s : [...SECTORES_DEFAULT]; }
  catch(e) { return [...SECTORES_DEFAULT]; }
}
function saveSectores(arr) { localStorage.setItem(SECTORES_KEY, JSON.stringify(arr)); }
function addSector(nombre) {
  const arr = getSectores();
  if (!arr.includes(nombre)) { arr.push(nombre); saveSectores(arr); }
}
function populateSectorSelect(selectedValue) {
  const sel = document.getElementById('f-sector');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Sin clasificar —</option>' +
    getSectores().map(s => `<option value="${s}"${s===selectedValue?' selected':''}>${s}</option>`).join('') +
    `<option value="__nuevo__">➕ Agregar sector…</option>`;
}
function onSectorChange(sel) {
  if (sel.value === '__nuevo__') {
    const nombre = prompt('Nombre del nuevo sector:','');
    if (nombre && nombre.trim()) {
      addSector(nombre.trim());
      populateSectorSelect(nombre.trim());
      sel.value = nombre.trim();
    } else {
      sel.value = '';
    }
  }
}
function onFiltroSectorChange(sel) {
  if (sel.value === '__nuevo__') {
    const nombre = prompt('Nombre del nuevo sector:','');
    if (nombre && nombre.trim()) {
      addSector(nombre.trim());
      filtroSector = nombre.trim();
    } else {
      filtroSector = 'todos';
    }
    renderAll();
  } else {
    filtroSector = sel.value;
    renderAll();
  }
}

// ── SUPABASE DATA LAYER ──
async function loadAll() {
  showLoading(true);
  try {
    const { data: regs, error: e1 } = await _supa.from('registros').select('*').order('created_at', {ascending: false});
    if (e1) throw e1;
    const { data: cots, error: e2 } = await _supa.from('cotizaciones').select('*').order('created_at', {ascending: true});
    if (e2) throw e2;
    records = (regs || []).map(r => ({
      id: r.id,
      nombre: r.nombre,
      telefono: r.telefono || '',
      email: r.email || '',
      ubicacion: r.ubicacion || '',
      sitioWeb: r.sitio_web || '',
      notas: r.notas || '',
      estado: r.estado || 'no_llamado',
      tipo: r.tipo || 'prospecto',
      sector: r.sector || '',
      cotizaciones: (cots || []).filter(c => c.registro_id === r.id).map(c => ({
        id: c.id, folio: c.folio, plan: c.plan, monto: Number(c.monto), fecha: c.fecha
      }))
    }));
  } catch(err) {
    console.error('Error loading:', err);
    toast('Error al cargar: ' + err.message);
  }
  showLoading(false);
  renderAll();
}

function showLoading(on) {
  if (on) document.getElementById('main-content').innerHTML = '<div style="padding:80px;text-align:center;color:var(--text-3);font-size:14px">Cargando datos...</div>';
}

async function dbAdd(data) {
  const { data: row, error } = await _supa.from('registros').insert([{
    nombre: data.nombre, telefono: data.telefono, email: data.email,
    ubicacion: data.ubicacion, sitio_web: data.sitioWeb,
    notas: data.notas, estado: data.estado, tipo: data.tipo, sector: data.sector
  }]).select().single();
  if (error) throw error;
  return row;
}
async function dbUpdate(id, data) {
  const { error } = await _supa.from('registros').update({
    nombre: data.nombre, telefono: data.telefono, email: data.email,
    ubicacion: data.ubicacion, sitio_web: data.sitioWeb,
    notas: data.notas, estado: data.estado, tipo: data.tipo, sector: data.sector
  }).eq('id', id);
  if (error) throw error;
}
async function dbDelete(id) {
  const { error } = await _supa.from('registros').delete().eq('id', id);
  if (error) throw error;
}
async function dbToggleStatus(id, newEstado) {
  const { error } = await _supa.from('registros').update({ estado: newEstado }).eq('id', id);
  if (error) throw error;
}
async function dbConvertir(id) {
  const { error } = await _supa.from('registros').update({ tipo: 'cliente' }).eq('id', id);
  if (error) throw error;
}
async function deleteCotizacion(cotId, registroId) {
  if (!confirm('¿Eliminar esta cotización del historial?')) return;
  try {
    const { error } = await _supa.from('cotizaciones').delete().eq('id', cotId);
    if (error) throw error;
    records = records.map(r => r.id === registroId
      ? {...r, cotizaciones: r.cotizaciones.filter(c => c.id !== cotId)}
      : r);
    renderAll();
    toast('Cotización eliminada');
  } catch(e) { toast('Error: ' + e.message); }
}
async function dbAddCotizacion(registroId, cot) {
  const { error } = await _supa.from('cotizaciones').insert([{
    registro_id: registroId, folio: cot.folio, plan: cot.plan, monto: cot.monto, fecha: cot.fecha
  }]);
  if (error) throw error;
}

function getFiltered(tipo) {
  return records.filter(r => r.tipo === tipo)
    .filter(r => filtroEstado === 'todos' || r.estado === filtroEstado)
    .filter(r => filtroSector === 'todos' || r.sector === filtroSector)

      const q = search.toLowerCase();
      return r.nombre.toLowerCase().includes(q) || (r.ubicacion||'').toLowerCase().includes(q) || (r.telefono||'').includes(q);
    });

// ── RENDER NOTAS ──
let notasClienteId = null;
let notasHistorial = {};
let notasSearch = '';
let notasAllFeed = [];

async function loadNotas(registroId) {
  try {
    const { data, error } = await _supa.from('notas_historial')
      .select('*').eq('registro_id', registroId).order('created_at', { ascending: true });
    if (error) throw error;
    notasHistorial[registroId] = (data || []).map(n => ({
      texto: n.contenido,
      fecha: new Date(n.created_at).toLocaleString('es-MX', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})
    }));
  } catch(e) { console.error('Error cargando notas:', e); }
}
async function loadAllNotas() {
  try {
    const { data, error } = await _supa.from('notas_historial')
      .select('*').order('created_at', { ascending: false });
    if (error) throw error;
    notasHistorial = {};
    notasAllFeed = (data || []).map(n => {
      if (!notasHistorial[n.registro_id]) notasHistorial[n.registro_id] = [];
      const entry = {
        texto: n.contenido,
        fecha: new Date(n.created_at).toLocaleString('es-MX', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})
      };
      notasHistorial[n.registro_id].push(entry);
      return { registro_id: n.registro_id, ...entry };
    });
  } catch(e) { console.error('Error cargando notas:', e); }
}

  const todos = records.filter(r => r.nombre && (!notasSearch || r.nombre.toLowerCase().includes(notasSearch.toLowerCase())));

          </button>`).join('')}

        <div style="font-size:13px;font-weight:700;color:#e8e4f4">Todas las notas</div>
        <div style="font-size:11px;color:#6b6488">${notasAllFeed.length} nota(s)</div>
      </div>
      ${clienteActual ? `

          <div class="avatar avatar-sm" style="background:${aColor(clienteActual.nombre)};width:20px;height:20px;font-size:9px">${esc(clienteActual.nombre.slice(0,2).toUpperCase())}</div>
          Nueva nota — ${esc(clienteActual.nombre)}
        </div>
        <div style="display:flex;gap:10px">
          <textarea id="nota-input" class="form-input" placeholder="Escribe una nota…" style="flex:1;resize:none;height:60px;font-size:13px"></textarea>
          <button class="btn-primary" onclick="guardarNota()" style="align-self:flex-end;padding:10px 18px;white-space:nowrap">Guardar</button>

            return `

                <div class="avatar avatar-sm" style="background:${aColor(nombre)}">${esc(nombre.slice(0,2).toUpperCase())}</div>

            </div>`;
          }).join('')}
      </div>
    </div>
  </div>`;
}
async function selectNotasCliente(id) {
  notasClienteId = id;
  renderAll();
  await loadAllNotas();
  renderAll();
}
async function guardarNota() {
  const txt = (document.getElementById('nota-input')||{value:''}).value.trim();
  if (!txt || !notasClienteId) return;
  try {
    const { error } = await _supa.from('notas_historial').insert([{
      registro_id: notasClienteId,
      contenido: txt
    }]);
    if (error) throw error;
    await loadAllNotas();
    toast('Nota guardada');
    renderAll();
  } catch(e) {
    toast('Error al guardar nota: ' + e.message);
  }
}

// ── ACTIONS ──
async function toggleStatus(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  const newEstado = r.estado === 'llamado' ? 'no_llamado' : 'llamado';
  try { await dbToggleStatus(id, newEstado); records = records.map(x => x.id===id?{...x,estado:newEstado}:x); renderAll(); }
  catch(err) { toast('Error: ' + err.message); }
}
async function convertir(id) {
  try { await dbConvertir(id); records = records.map(r=>r.id===id?{...r,tipo:'cliente'}:r); toast('Convertido a cliente'); renderAll(); }
  catch(err) { toast('Error: ' + err.message); }
}
async function eliminar(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  try { await dbDelete(id); records = records.filter(r=>r.id!==id); renderAll(); }
  catch(err) { toast('Error: ' + err.message); }
}

async function saveForm() {
  const nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { alert('El nombre es obligatorio.'); return; }
  const data = {
    nombre, telefono: document.getElementById('f-tel').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    ubicacion: document.getElementById('f-ubic').value.trim(),
    sitioWeb: document.getElementById('f-web').value.trim(),
    notas: document.getElementById('f-notas').value.trim(),
    estado: document.getElementById('f-estado').value,
    tipo: document.getElementById('f-tipo').value,
    sector: document.getElementById('f-sector').value,
  };
  try {
    if (editingId) { await dbUpdate(editingId, data); records = records.map(r=>r.id===editingId?{...r,...data}:r); toast('Registro actualizado'); }
    else { const row = await dbAdd(data); records = [{...data, id:row.id, cotizaciones:[]}, ...records]; toast('Registro agregado'); }

  } catch(err) { alert('Error al guardar: ' + err.message); }
}

function selectQuotePlan(id) {
  if (selectedPlanIds.includes(id)) {
    selectedPlanIds = selectedPlanIds.filter(x => x !== id);

    selectedPlanIds.push(id);
  }
  const selPlanes = PLANES.filter(p => selectedPlanIds.includes(p.id));
  const totalImpl = selPlanes.reduce((s, p) => s + p.implementacion, 0);
  const totalMens = selPlanes.reduce((s, p) => s + p.mensual, 0);
  renderPlanList();
  document.getElementById('q-precio-impl').value = totalImpl || '';
  document.getElementById('q-precio-mens').value = totalMens || '';
}

.client-lbl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;width:120px;flex-shrink:0}
.client-val{font-size:11px;font-weight:600;color:#0f172a}
.plan-name-hdr{background:linear-gradient(135deg,#0a0a0f 0%,#2d1066 100%);border-radius:7px 7px 0 0;padding:12px 18px}
.plan-name-hdr h2{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.2px}
.plan-name-hdr p{font-size:8px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.plan-body{border:1px solid #e2e8f0;border-top:none;border-radius:0 0 7px 7px;overflow:hidden}
.feats-section{padding:10px 18px 8px;border-bottom:1px solid #e2e8f0;display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.feat{font-size:10px;color:#475569;padding:3px 0;border-bottom:1px solid #f8fafc;display:flex;align-items:flex-start;gap:6px}
.feat:last-child{border-bottom:none}
.feat::before{content:"✓";color:#22c55e;font-weight:700;flex-shrink:0}
.pricing-section{padding:10px 18px;display:grid;grid-template-columns:1fr 1fr;gap:0 24px}
.pricing-block{margin-bottom:8px}
.pricing-block:last-child{margin-bottom:0}
.pricing-title{font-size:8px;font-weight:700;color:#0f172a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e2e8f0}
.price-line{display:flex;justify-content:space-between;padding:4px 0;font-size:10px;border-bottom:1px solid #f8fafc}
.price-line:last-child{border-bottom:none}
.price-line .lbl{color:#64748b}
.price-line .amt{font-weight:500;color:#0f172a}
.price-line.iva .lbl{color:#94a3b8;font-style:italic}
.price-line.iva .amt{color:#94a3b8}
.price-line.total{border-top:1.5px solid #0f172a;margin-top:4px;padding-top:6px;font-weight:700;font-size:12px}
.price-line.total .lbl{color:#0f172a}
.price-line.total .amt{color:#0f172a;font-size:13px}
.pricing-divider{display:none}
.footer{padding:8px 24px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:9px;color:#94a3b8}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}

// ── IMPORT / EXPORT ──
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const firstLine = text.split(/\r?\n/)[0];
  const delim = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
  const rows = []; let row = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (inQuote) {
      if (ch==='"'&&next==='"'){field+='"';i++;} else if(ch==='"'){inQuote=false;} else{field+=ch;}
    } else {
      if(ch==='"'){inQuote=true;}
      else if(ch===delim){row.push(field.trim());field='';}
      else if(ch==='\n'||(ch==='\r'&&next==='\n')){if(ch==='\r')i++;row.push(field.trim());field='';if(row.some(c=>c))rows.push(row);row=[];}
      else{field+=ch;}
    }
  }
  if(field||row.length){row.push(field.trim());if(row.some(c=>c))rows.push(row);}
  return rows;
}
async function importCSV(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async evt => {
    try {
      const rows = parseCSV(evt.target.result);
      if(rows.length<2){toast('El archivo está vacío');return;}
      const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      const headers = rows[0].map(norm);
      const get = (row,keys) => { for(const k of keys){const i=headers.indexOf(norm(k));if(i>=0&&i<row.length)return row[i].trim();}return '';};
      const nuevos = rows.slice(1).map(cols=>({
        nombre:   get(cols,['nombre','name','empresa']),
        telefono: get(cols,['telefono','# telefono','phone','tel','celular']),
        ubicacion:get(cols,['ubicacion','ubicación','location','direccion','ciudad']),
        sitio_web:get(cols,['sitio web','sitioweb','website','web','sitio','url']),
        notas:    get(cols,['comentarios','notas','comments','nota']),
        email:    get(cols,['correo','email','mail','e-mail']),
        estado:'no_llamado', tipo:'prospecto',
      })).filter(r=>r.nombre);
      if(nuevos.length===0){alert('No se encontraron registros. Verifica los encabezados.');return;}
      const {error} = await _supa.from('registros').insert(nuevos);
      if(error) throw error;
      toast(nuevos.length + ' registros importados');
      await loadAll();
    } catch(err){alert('Error: '+err.message);}
  };
  reader.readAsText(file,'utf-8');
  e.target.value='';
}
function exportCSV(tipo) {
  const lista = tipo==='all' ? records : records.filter(r=>r.tipo===tipo);
  const cols = [['nombre','Nombre'],['ubicacion','Ubicación'],['telefono','Teléfono'],['email','Correo'],['sitioWeb','Sitio Web'],['estado','Estado'],['tipo','Tipo'],['notas','Comentarios']];
  const e2 = v => `"${String(v||'').replace(/"/g,'""')}"`;
  const csv = [cols.map(c=>e2(c[1])),...lista.map(r=>cols.map(c=>e2(r[c[0]])))].map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`synapse_crm_${tipo}_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url); toast('CSV exportado');
}
function closeModal(id){document.getElementById(id).style.display='none';}
function overlayClose(event,id){if(event.target===event.currentTarget)closeModal(id);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('modal-form');closeModal('modal-quote');closeModal('modal-plan');}});

// ── LOGIN ──
function showApp(email) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('crm-app').style.display = '';
  document.getElementById('sidebar-user').textContent = email;
  loadAll();
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Ingresando…';
  try {
    const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    showApp(data.user.email);
  } catch(e) {
    err.textContent = 'Correo o contraseña incorrectos.';
    document.getElementById('login-pass').value = '';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });

async function doLogout() {
  await _supa.auth.signOut();
  document.getElementById('crm-app').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  records = []; tab = 'dashboard'; search = ''; filtroEstado = 'todos';
}

// ── INIT ── restore session if already logged in
(async () => {
  const { data: { session } } = await _supa.auth.getSession();
  if (session) showApp(session.user.email);
})();
