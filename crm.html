<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse CRM</title>
  <link rel="stylesheet" href="crm.css">
</head>
<body>

<div class="layout">
  <nav class="sidebar">
    <div class="brand">
      <img src="logo.png" alt="Synapse" onerror="this.src='logo.svg'">
    </div>
    <div class="nav" id="nav-menu"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user"></div>
      <div class="sidebar-date" id="sidebar-date"></div>
    </div>
  </nav>
  <div class="main-wrap">
    <div class="main" id="main-content"></div>
  </div>
</div>

<!-- ═══ FORM MODAL ═══ -->
<div id="modal-form" style="display:none" class="overlay" onclick="overlayClose(event,'modal-form')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title" id="mf-title">Agregar registro</span>
      <button class="modal-close" onclick="closeModal('modal-form')">×</button>
    </div>
    <div class="form-grid">
      <div><label class="form-lbl">Nombre *</label><input class="form-input" id="f-nombre" placeholder="Empresa o persona"></div>
      <div><label class="form-lbl">Teléfono</label><input class="form-input" id="f-tel" placeholder="33 1234 5678" type="tel"></div>
      <div><label class="form-lbl">Correo</label><input class="form-input" id="f-email" placeholder="correo@empresa.com" type="email"></div>
      <div><label class="form-lbl">Estado</label>
        <select class="form-input" id="f-estado"><option value="no_llamado">Sin llamar</option><option value="llamado">Llamado</option></select></div>
      <div class="form-full"><label class="form-lbl">Ubicación</label><input class="form-input" id="f-ubic" placeholder="Ciudad, colonia…"></div>
      <div class="form-full"><label class="form-lbl">Sitio Web</label><input class="form-input" id="f-web" placeholder="https://ejemplo.com" type="url"></div>
      <div class="form-full"><label class="form-lbl">Nota rápida</label><textarea class="form-input" id="f-notas" placeholder="Referencia rápida del cliente…" rows="2"></textarea></div>
      <div><label class="form-lbl">Tipo</label>
        <select class="form-input" id="f-tipo"><option value="prospecto">Prospecto</option><option value="cliente">Cliente</option></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-form')">Cancelar</button>
      <button class="btn-primary" onclick="saveForm()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ PLAN MODAL (Servicios CRUD) ═══ -->
<div id="modal-plan" style="display:none" class="overlay" onclick="overlayClose(event,'modal-plan')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title" id="plan-modal-title">Agregar servicio</span>
      <button class="modal-close" onclick="closeModal('modal-plan')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-full"><label class="form-lbl">Nombre del servicio</label>
        <input class="form-input" id="p-nombre" placeholder="ej. Página Web Profesional"></div>
      <div><label class="form-lbl">Implementación ($)</label>
        <input class="form-input" id="p-impl" type="number" min="0" placeholder="13000"></div>
      <div><label class="form-lbl">Mensual ($)</label>
        <input class="form-input" id="p-mens" type="number" min="0" placeholder="800"></div>
      <div class="form-full"><label class="form-lbl">Características (una por línea)</label>
        <textarea class="form-input" id="p-features" rows="7" placeholder="Diseño personalizado adaptado a tu empresa&#10;Diseño responsivo: celular, tablet y computadora&#10;..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-plan')">Cancelar</button>
      <button class="btn-primary" onclick="savePlan()">Guardar servicio</button>
    </div>
  </div>
</div>

<!-- ═══ ADD NOTA MODAL ═══ -->
<div id="modal-add-nota" style="display:none" class="overlay" onclick="overlayClose(event,'modal-add-nota')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">Agregar nota</span>
      <button class="modal-close" onclick="closeModal('modal-add-nota')">×</button>
    </div>
    <div style="margin-bottom:14px">
      <label class="form-lbl">Cliente</label>
      <select class="form-input" id="nota-registro-id"></select>
    </div>
    <div>
      <label class="form-lbl">Nota</label>
      <textarea class="form-input" id="nota-contenido" rows="6"
        placeholder="Escribe aquí: qué comentó, qué necesita, próximos pasos, detalles importantes…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-add-nota')">Cancelar</button>
      <button class="btn-primary" onclick="guardarNota()">Guardar nota</button>
    </div>
  </div>
</div>

<!-- ═══ ADD CLAVE MODAL ═══ -->
<div id="modal-add-clave" style="display:none" class="overlay" onclick="overlayClose(event,'modal-add-clave')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">Agregar credencial</span>
      <button class="modal-close" onclick="closeModal('modal-add-clave')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-full"><label class="form-lbl">Cliente</label>
        <select class="form-input" id="clave-registro-id"></select></div>
      <div><label class="form-lbl">Nombre</label>
        <input class="form-input" id="clave-nombre" placeholder="cPanel, Google Analytics…"></div>
      <div><label class="form-lbl">Tipo</label>
        <select class="form-input" id="clave-tipo">
          <option value="contraseña">Contraseña</option>
          <option value="api key">API Key</option>
          <option value="url">URL</option>
          <option value="correo">Correo</option>
          <option value="usuario">Usuario</option>
          <option value="token">Token</option>
          <option value="otro">Otro</option>
        </select></div>
      <div class="form-full"><label class="form-lbl">Usuario (opcional)</label>
        <input class="form-input" id="clave-usuario" placeholder="Solo si tiene usuario/login separado…"></div>
      <div class="form-full"><label class="form-lbl">Contraseña / Valor</label>
        <input class="form-input" id="clave-valor" placeholder="Contraseña, API key, URL, token…"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-add-clave')">Cancelar</button>
      <button class="btn-primary" onclick="guardarClaveModal()">Guardar credencial</button>
    </div>
  </div>
</div>

<!-- ═══ CONFIRM MODAL ═══ -->
<div id="modal-confirm" style="display:none" class="overlay" onclick="overlayClose(event,'modal-confirm')">
  <div class="modal modal-sm" onclick="event.stopPropagation()">
    <div class="modal-hdr"><span class="modal-title" id="confirm-title">Confirmar</span></div>
    <p class="modal-body" id="confirm-body">¿Seguro que deseas eliminar?</p>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-confirm')">Cancelar</button>
      <button class="btn-danger" id="confirm-btn" onclick="ejecutarConfirm()">Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="crm.js"></script>
</body>
</html>
