<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse Admin</title>
  <link rel="icon" href="../favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 2.5rem;
      margin: 1rem;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
    }

    .login-logo img { height: 32px; }

    .login-logo-label {
      font-size: .75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }

    .login-sub {
      font-size: .875rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: .4rem;
    }

    input[type="password"] {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: .75rem 1rem;
      color: #e2e8f0;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1.25rem;
    }

    input[type="password"]:focus { border-color: #a855f7; }

    .btn-login {
      width: 100%;
      background: #a855f7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .8rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }

    .btn-login:hover { background: #9333ea; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="../logo.png" alt="Synapse">
      <span class="login-logo-label">Panel Admin</span>
    </div>
    <h1>Bienvenido</h1>
    <p class="login-sub">Ingresa tu contraseña para acceder al panel de edición.</p>
    <div class="error-msg" id="error-msg">Contraseña incorrecta. Intenta de nuevo.</div>
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autofocus>
    <button class="btn-login" id="btn-login" onclick="login()">Entrar →</button>
  </div>

  <script>
    if (localStorage.getItem('synapse_admin_token')) {
      window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('error-msg');

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verificando…';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('synapse_admin_token', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          err.textContent = data.error || 'Contraseña incorrecta.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Entrar →';
        }
      } catch {
        err.textContent = 'Error de conexión. Intenta de nuevo.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar →';
      }
    }
  </script>
</body>
</html>
